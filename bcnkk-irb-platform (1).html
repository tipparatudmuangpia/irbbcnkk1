<!-- ▼ Custom design tokens & utilities ▼ -->
<style>
:root {
  --ink: #18211f; --ink-soft: #3b4543; --ink-mute: #6b7672;
  --paper: #f7f3ea; --paper-deep: #efe9da;
  --card: #ffffff; --line: #e6dfcd; --line-soft: #f0eadb;
  --teal: #0f4c4a; --teal-deep: #0a3735; --teal-soft: #d6e7e4;
  --gold: #b48a3c; --gold-soft: #f3e7c8;
  --terra: #b3553a; --terra-soft: #f5dfd2;
  --moss: #5a7a48; --moss-soft: #dde8d1;
  --plum: #6b3a5c; --plum-soft: #ead7e3;
}

html, body, #root { background: #f7f3ea; }

.font-display { font-family: 'Fraunces', 'IBM Plex Sans Thai', Georgia, serif; font-feature-settings: 'ss01', 'ss02'; letter-spacing: -0.01em; }
.font-body { font-family: 'IBM Plex Sans Thai', 'IBM Plex Sans', system-ui, sans-serif; }
.font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

.paper-grain {
  background-image:
    radial-gradient(circle at 20% 30%, rgba(180,138,60,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(15,76,74,0.04) 0%, transparent 50%);
}

.deco-rule {
  background-image: linear-gradient(to right, var(--ink) 50%, transparent 50%);
  background-size: 4px 1px; background-repeat: repeat-x; background-position: 0 50%;
  height: 1px;
}

.shadow-paper { box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px -12px rgba(15,76,74,0.12); }
.shadow-paper-deep { box-shadow: 0 2px 0 rgba(0,0,0,0.03), 0 20px 40px -20px rgba(15,76,74,0.18); }

@keyframes slide-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-slide { animation: slide-up 0.4s ease-out; }

@keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }

.scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
.scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
.scrollbar-thin::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

/* Boot screen */
#boot {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 18px;
  background: #f7f3ea;
  transition: opacity 0.4s ease;
  z-index: 9999;
}
#boot.fade { opacity: 0; pointer-events: none; }
.boot-mark {
  width: 56px; height: 56px; border-radius: 12px; background: #0f4c4a;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 12px 30px -12px rgba(15,76,74,0.4); position: relative;
}
.boot-mark::after {
  content: ''; position: absolute; bottom: -3px; right: -3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: #b48a3c; box-shadow: 0 0 0 3px #f7f3ea;
}
.boot-mark svg { color: #f3e7c8; }
.boot-text { font-family: 'Fraunces', Georgia, serif; font-size: 14px; color: #6b7672; letter-spacing: 0.02em; }
.boot-text b { color: #0f4c4a; font-weight: 600; }
.boot-spinner {
  width: 24px; height: 24px;
  border: 2.5px solid #efe9da; border-top-color: #0f4c4a;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Body defaults */
body {
  margin: 0; padding: 0;
  font-family: 'IBM Plex Sans Thai', 'IBM Plex Sans', 'Sarabun', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: #18211f;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
</style>

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --ink: #18211f;
  --ink-soft: #3b4543;
  --ink-mute: #6b7672;
  --paper: #f7f3ea;
  --paper-deep: #efe9da;
  --card: #ffffff;
  --line: #e6dfcd;
  --line-soft: #f0eadb;
  --teal: #0f4c4a;
  --teal-deep: #0a3735;
  --teal-soft: #d6e7e4;
  --gold: #b48a3c;
  --gold-soft: #f3e7c8;
  --terra: #b3553a;
  --terra-soft: #f5dfd2;
  --moss: #5a7a48;
  --moss-soft: #dde8d1;
  --plum: #6b3a5c;
  --plum-soft: #ead7e3;
}

* { box-sizing: border-box; }
body, html, #root { background: var(--paper); }

.font-display { font-family: 'Fraunces', 'IBM Plex Sans Thai', Georgia, serif; font-feature-settings: 'ss01', 'ss02'; letter-spacing: -0.01em; }
.font-body { font-family: 'IBM Plex Sans Thai', 'IBM Plex Sans', system-ui, sans-serif; }
.font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

.paper-grain {
  background-image:
    radial-gradient(circle at 20% 30%, rgba(180,138,60,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(15,76,74,0.04) 0%, transparent 50%);
}

.deco-rule {
  background-image: linear-gradient(to right, var(--ink) 50%, transparent 50%);
  background-size: 4px 1px;
  background-repeat: repeat-x;
  background-position: 0 50%;
  height: 1px;
}

.shadow-paper { box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 8px 24px -12px rgba(15,76,74,0.12); }
.shadow-paper-deep { box-shadow: 0 2px 0 rgba(0,0,0,0.03), 0 20px 40px -20px rgba(15,76,74,0.18); }

.border-dotted-thai { border-style: dashed; border-color: var(--line); }

@keyframes slide-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.animate-slide { animation: slide-up 0.4s ease-out; }

@keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }

.scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
.scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
